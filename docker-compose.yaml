# =============================================================================
# docker-compose.yml — BASE
# Dev:  docker compose -f docker-compose.yaml -f docker-compose.dev.yaml up
# Prod: docker compose -f docker-compose.yaml -f docker-compose.prod.yaml up -d
# =============================================================================

x-shared-config: &default-networks
    networks:
        - app

services:

    app:
        <<: *default-networks
        build:
            context: .
            args:
                APP_UID: ${APP_UID:-1000}
                APP_GID: ${APP_GID:-1000}
                TZ: ${TZ:-UTC}
        environment:
            APP_ENV: ${APP_ENV:-prod}
            APP_SECRET: ${APP_SECRET}
            DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?serverVersion=18&charset=utf8
            MAILER_DSN: smtp://mailpit:1025
            REDIS_URL: redis://redis:6379
            CORS_ALLOW_ORIGIN: ${CORS_ALLOW_ORIGIN:-*}
            TZ: ${TZ:-UTC}
        depends_on:
            postgres:
                condition: service_healthy
            redis:
                condition: service_healthy
        restart: unless-stopped

    postgres:
        <<: *default-networks
        image: postgres:18.4-alpine
        environment:
            POSTGRES_DB: ${POSTGRES_DB}
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
            TZ: ${TZ:-UTC}
        volumes:
            - postgres_data:/var/lib/postgresql
            # ./docker/postgres/init:/docker-entrypoint-initdb.d (uncomment, если нужен entrypoint)
        healthcheck:
            test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
            interval: 5s
            timeout: 5s
            retries: 10
            start_period: 10s
        restart: unless-stopped

    redis:
        <<: *default-networks
        image: redis:8.6-alpine
        command: redis-server --appendonly yes
        volumes:
            - redis_data:/data
        healthcheck:
            test: [ "CMD", "redis-cli", "ping" ]
            interval: 5s
            timeout: 3s
            retries: 10
            start_period: 5s
        restart: unless-stopped

    mailpit:
        <<: *default-networks
        image: axllent/mailpit:latest
        restart: unless-stopped

networks:
    app:
        driver: bridge

volumes:
    postgres_data:
    redis_data:
